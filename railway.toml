[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Railway runs two services from this repo — configure each in the dashboard:
#
#  Service 1 "edgarstream-worker"
#    Start command: python services/workers/pipeline_worker.py
#
#  Service 2 "edgarstream-poller"
#    Start command: python services/listener/rss_poller.py
#
# Both services share the same env vars below.

[deploy]
startCommand = "python services/workers/pipeline_worker.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
