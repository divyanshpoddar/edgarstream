services:
  - type: web
    name: edgarstream-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /metrics
    envVars:
      - key: SERVICE_TYPE
        value: worker
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      - key: SNOWFLAKE_USER
        sync: false
      - key: SNOWFLAKE_PASSWORD
        sync: false
      - key: SNOWFLAKE_ACCOUNT
        sync: false
      - key: SNOWFLAKE_WAREHOUSE
        value: COMPUTE_WH
      - key: SNOWFLAKE_DATABASE
        value: EDGAR_ANALYTICS
      - key: SNOWFLAKE_SCHEMA
        value: PUBLIC

  - type: web
    name: edgarstream-poller
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: SERVICE_TYPE
        value: poller
      - key: POLL_INTERVAL_SECONDS
        value: "1800"
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
