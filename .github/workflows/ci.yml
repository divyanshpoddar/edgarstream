name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: edgar_user
          POSTGRES_PASSWORD: edgar_password
          POSTGRES_DB: edgar_metadata
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Init database
        env:
          DATABASE_URL: postgresql://edgar_user:edgar_password@localhost:5434/edgar_metadata
        run: python -c "from shared.utils.db import init_db; init_db()"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://edgar_user:edgar_password@localhost:5434/edgar_metadata
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: pytest tests/ -v --tb=short
