name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install only the packages needed for tests — arelle, snowflake,
      # prefect, and pandas are excluded to keep CI fast (< 60s install).
      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn "pydantic>=2.7" pydantic-settings sqlalchemy \
            psycopg2-binary "httpx>=0.27" beautifulsoup4 lxml feedparser \
            redis prometheus-client prometheus-fastapi-instrumentator \
            mangum python-dotenv \
            pytest pytest-mock "respx>=0.21" ruff

      - name: Lint
        run: ruff check services/ shared/ tests/ --ignore E501

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///./test.db"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          REDIS_SSL: "false"
          SNOWFLAKE_USER: ""
          SNOWFLAKE_PASSWORD: ""
          SNOWFLAKE_ACCOUNT: ""
